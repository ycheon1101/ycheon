<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
  <!-- LinkedIn-style badge: solid rounded square, "CV" punched through (transparent) -->
  <defs>
    <mask id="resumeCvStencil">
      <rect width="24" height="24" fill="#000"/>
      <rect x="3.25" y="3.25" width="17.5" height="17.5" rx="2.75" ry="2.75" fill="#fff"/>
      <text
        x="12"
        y="15.65"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', 'Arial Black', Arial, sans-serif"
        font-size="7.35"
        font-weight="900"
        letter-spacing="-0.03em"
        fill="#000"
      >CV</text>
    </mask>
  </defs>
  <rect width="24" height="24" fill="#000" mask="url(#resumeCvStencil)"/>
</svg>
